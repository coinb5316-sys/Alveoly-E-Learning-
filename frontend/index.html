    <!-- CRITICAL: Global polyfill for simple-peer and WebRTC -->
    <script>
      // This MUST run before any module scripts
      (function() {
        // Fix for "global is not defined" in simple-peer
        if (typeof global === 'undefined') {
          window.global = window;
        }
        
        if (typeof globalThis === 'undefined') {
          window.globalThis = window;
        }
        
        // Process polyfill
        if (typeof process === 'undefined') {
          window.process = {
            env: {},
            nextTick: function(fn) {
              setTimeout(fn, 0);
            },
            browser: true,
            version: '',
            versions: {},
            platform: 'browser'
          };
        }
        
        // Buffer polyfill (simplified for initial load)
        if (typeof Buffer === 'undefined') {
          window.Buffer = {
            from: function(data) {
              if (typeof data === 'string') {
                return new TextEncoder().encode(data);
              }
              return new Uint8Array(data);
            },
            isBuffer: function() { return false; },
            alloc: function(size) { return new Uint8Array(size); }
          };
        }
        
        console.log('✅ Global polyfills loaded for WebRTC');
      })();
    </script>
