    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EducationalOrganization",
        "name": "Alveoly E-Learning Academy of Health and Sciences",
        "url": "https://alveolye-learning.academy",

          "https://www.linkedin.com/company/alveoly-health-sciences"
        ],
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "GH"
        }
      }
    </script>

    <!-- Preload critical assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- FORCE OVERRIDE - Fix all localhost connections -->
    <script>
      // Force all WebSocket connections to use production server
      (function() {
        const PROD_URL = 'https://alveoly-e-learning-of-health-api.onrender.com';
        const PROD_WS_URL = 'wss://alveoly-e-learning-of-health-api.onrender.com';
        
        console.log('🔧 Force fix: Redirecting all connections to production');
        
        // Override WebSocket
        const OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
          if (url && (url.includes('localhost:5000') || url.includes('ws://localhost'))) {
            url = url.replace('ws://localhost:5000', PROD_WS_URL);
            url = url.replace('http://localhost:5000', PROD_URL);
            console.log('✅ Fixed WebSocket URL:', url);
          }
          return new OriginalWebSocket(url, protocols);
        };
        
        // Override fetch
        const OriginalFetch = window.fetch;
        window.fetch = function(url, options) {
          if (typeof url === 'string' && url.includes('localhost:5000')) {
            url = url.replace('http://localhost:5000', PROD_URL);
            console.log('✅ Fixed fetch URL:', url);
          }
          return OriginalFetch(url, options);
        };
        
        // Override XMLHttpRequest
        const OriginalXHROpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url, async, user, password) {
          if (typeof url === 'string' && url.includes('localhost:5000')) {
            url = url.replace('http://localhost:5000', PROD_URL);
            console.log('✅ Fixed XHR URL:', url);
          }
          return OriginalXHROpen.call(this, method, url, async, user, password);
        };
        
        // Set global variables
        window.__API_URL__ = PROD_URL;
        window.__SOCKET_URL__ = PROD_URL;
        
        console.log('✅ Force fix applied successfully');
      })();
    </script>
  </head>

  <body>
    <!-- ROOT DIV FOR REACT -->
    <div id="root"></div>

    <!-- MAIN REACT ENTRY -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
